<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ぐるまっぷ カード獲得</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f5f4f1;
      color: #333;
      padding: 24px 16px;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 360px;
      text-align: center;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #ececec;
      padding: 24px 20px;
      box-sizing: border-box;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
      margin: 0 0 18px;
    }

    .action-button {
      display: block;
      width: 100%;
      background-color: #ff6b35;
      color: #fff;
      padding: 12px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      box-sizing: border-box;
      margin-bottom: 12px;
    }

    .action-button.disabled {
      background-color: #c7c7c7;
      pointer-events: none;
    }

    .store-links {
      display: grid;
      gap: 10px;
    }

    .store-link {
      display: block;
      background: #111;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="logo">ぐるまっぷ</div>
    <h1>カードを獲得する</h1>
    <p>この店舗の図鑑カードを発見しました！<br>アプリがインストール済みの場合は「カードを獲得」を押してください。<br>未インストールの場合はストアからダウンロードしてください。</p>
    <a id="open-app-button" class="action-button" href="#">カードを獲得</a>

    <div class="store-links">
      <a class="store-link" href="https://apps.apple.com/jp/app/id6757521236">App Storeでダウンロード</a>
      <a class="store-link" href="https://play.google.com/store/apps/details?id=com.groumap.groumapapp">Google Playでダウンロード</a>
    </div>
  </main>

  <script>
    (function setupManualAppOpen() {
      var openAppButton = document.getElementById('open-app-button');
      if (!openAppButton) return;

      var params = window.location.search || '';
      if (!params) {
        openAppButton.classList.add('disabled');
        openAppButton.setAttribute('aria-disabled', 'true');
        openAppButton.removeAttribute('href');
        return;
      }

      openAppButton.href = 'groumap://checkin' + params;
    })();
  </script>
</body>
</html>
